name: Bug report
description: Something is broken — a UI glitch, a wrong judge verdict, a broken link, a build error.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out as much of this as you can — it makes triage much faster.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the problem/page URL if applicable (e.g. /dsa/arrays/two-sum).
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs
      description: Drag and drop images here, or paste console/terminal output.
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, browser + version, Node version (if running locally)"
    validations:
      required: false
